<!-- client/publish.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Hub - Publish Content</title>
    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/publishStyle.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="home-header">
      <div class="home-header-inner">
        <a href="home.html" class="home-logo">
          <div class="home-logo-icon">LH</div>
          <span>Learning Hub</span>
        </a>
      </div>
    </header>

    <!-- Main -->
    <main class="main-content">
      <!-- Type Tabs -->
      <div class="publish-tabs">
        <button
          class="publish-tab active"
          data-type="article"
          onclick="switchType('article')"
        >
          Article
        </button>
        <button
          class="publish-tab"
          data-type="video"
          onclick="switchType('video')"
        >
          Video
        </button>
        <button
          class="publish-tab"
          data-type="voice"
          onclick="switchType('voice')"
        >
          Voice Note
        </button>
      </div>

      <!-- Form -->
      <form id="publishForm" novalidate>
        <!-- Category -->
        <div class="form-group">
          <label class="form-label">Category</label>
          <div class="category-display" id="categoryDisplay"></div>
        </div>

        <!-- Title -->
        <div class="form-group">
          <label class="form-label" for="title"
            >Title <span class="required">*</span></label
          >
          <input
            type="text"
            id="title"
            class="form-input"
            placeholder="My title......"
          />
          <div class="error-msg" id="titleError">Title is required</div>
        </div>

        <!-- Article Content -->
        <div class="form-group article-field">
          <label class="form-label" for="articleContent"
            >Content <span class="required">*</span></label
          >
          <textarea
            id="articleContent"
            class="form-input form-textarea"
            placeholder="Write your article content here......"
            rows="8"
          ></textarea>
          <div class="error-msg" id="contentError">Content is required</div>
        </div>

        <!-- Video URL -->
        <div class="form-group video-field hidden">
          <label class="form-label" for="videoUrl"
            >Video URL <span class="required">*</span></label
          >
          <input
            type="text"
            id="videoUrl"
            class="form-input"
            placeholder="https://youtube.com/watch?v=..."
          />
          <div class="error-msg" id="urlError">Video URL is required</div>
        </div>

        <!-- Voice Recorder -->
        <div class="form-group voice-field hidden">
          <label class="form-label"
            >Voice Recording <span class="required">*</span></label
          >
          <div class="voice-recorder" id="voiceRecorder">
            <button
              type="button"
              class="btn-record"
              id="recordBtn"
              onclick="toggleRecording()"
            >
              <span id="recordIcon">🎙</span>
              <span id="recordText">Start Recording</span>
            </button>
            <div class="record-timer hidden" id="recordTimer">00:00</div>
            <audio
              class="record-preview hidden"
              id="recordPreview"
              controls
            ></audio>
          </div>
          <div class="error-msg" id="voiceError">
            Voice recording is required
          </div>
        </div>

        <!-- Error Message -->
        <div class="publish-error" id="publishError"></div>

        <!-- Buttons -->
        <div class="publish-actions">
          <button
            type="button"
            class="btn btn-secondary btn-cancel"
            onclick="window.location.href = 'home.html'"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="btn btn-primary btn-publish"
            id="publishBtn"
          >
            Publish
          </button>
        </div>
      </form>
    </main>

    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <p>Uploading content...</p>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay hidden" id="successOverlay">
      <div class="success-icon">✓</div>
      <p class="success-text" id="successText">
        Article Published Successfully
      </p>
    </div>

    <script src="../scripts/publish.js"></script>
    <script src="../helper/apiHelper.js"></script>
    <script src="../helper/uiHelper.js"></script>
  </body>
</html>
