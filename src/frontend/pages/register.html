<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Hub - Create Account</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/registerStyle.css">
</head>
<body>
  <div class="auth-page">
    <header class="auth-header">
      <div class="logo">
        <div class="logo-icon">LH</div>
        <span>Learning Hub</span>
      </div>
    </header>
    
    <div class="auth-card register-card">
      <h1 class="page-title">Create your account</h1>
      
      <div class="alert alert-error" id="formError"></div>
      <div class="alert alert-success" id="formSuccess"></div>
      
      <form id="registerForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="text" 
            id="email" 
            class="form-input" 
            placeholder="Enter your email (e.g., name@domain.com)"
            autocomplete="email"
          >
          <div class="error-msg" id="emailError">Invalid data</div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="userName">Username</label>
          <input 
            type="text" 
            id="userName" 
            class="form-input" 
            placeholder="Choose a username (letters, numbers, spaces, special chars)"
            autocomplete="username"
          >
          <div class="error-msg" id="userNameError">Invalid data</div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Min 8 chars, max 16, with uppercase & special character"
            autocomplete="new-password"
          >
          <div class="error-msg" id="passwordError">Invalid data</div>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
      </form>
      
      <p class="link-text">
        Already have an account? <a href="../index.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="../scripts/Auth.js"></script>
  <script src="../scripts/Register.js"></script>
</body>
</html>
