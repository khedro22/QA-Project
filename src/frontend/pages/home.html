<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Hub - Home</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/homeStyle.css">
</head>
<body>
  <header class="home-header">
    <div class="home-header-inner">
      <a href="home.html" class="home-logo">
        <div class="home-logo-icon">LH</div>
        <span>Learning Hub</span>
      </a>
      
      <div class="header-actions">
             <a href="admin.html" class="manage-users-link hidden" id="manageUsersLink">
  Manage Users
</a>
     
   
        <span class="user-name" id="userName"></span>
        <button class="logout-btn" onclick="showLogoutModal()">Log out</button>
      </div>
    </div>
  </header>
  <div class="modal-overlay" id="logoutModal">
    <div class="modal modal-sm">
      <div class="modal-body text-center">
        <p class="modal-text">Are you sure you want to log out ?</p>
      </div>
      <div class="modal-footer modal-footer-center">
        <button class="btn btn-secondary" onclick="closeLogoutModal()">Cancel</button>
        <button class="btn btn-primary" onclick="confirmLogout()">Log out</button>
      </div>
    </div>
  </div>
   <!-- Success Overlay -->
    <div class="success-overlay hidden" id="successOverlay">
      <div class="success-icon">✓</div>
      <p class="success-text" id="successText">
        You have been successfully logged out
      </p>
    </div>
</body>
  <main class="main-content">
    <div class="cat-tabs" id="catTabs"></div>
    
    <div class="cat-actions" id="catActions"></div>
    
    <h2 class="content-section-title" id="sectionTitle"></h2>
    
    <div class="content-grid" id="contentGrid"></div>
  </main>
   

</body>
 <script src="../helper/notificationsHelper.js"></script>
  <script src="../helper/apiHelper.js"></script>
    <script src="../helper/uiHelper.js"></script>
    <script src="../scripts/Home.js"></script>
  <script src="../helper/logout.js"></script>

</body>
</html>
