<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/adminStyle.css" />
  </head>
  <body>
    <header class="home-header">
      <div class="home-header-inner">
        <a href="home.html" class="home-logo">
          <div class="home-logo-icon">LH</div>
          <span>Learning Hub</span>
        </a>

        <div class="header-actions">
          <span class="user-name" id="userName"></span>
          <button class="logout-btn" onclick="showLogoutModal()">
            Log out
          </button>
        </div>
      </div>
    </header>
    <main class="main-content">
      <div class="content-title-row">
        <h2>All user accounts</h2>
        <button class="btn-return" onclick="window.location.href = 'home.html'">
          Return to Home Page
        </button>
      </div>
      <div class="admin-table">
        <div class="admin-row admin-head">
          <div>USERNAME</div>
          <div>EMAIL</div>
          <div>ACTION</div>
        </div>

        <div id="usersContainer"></div>
      </div>
    </main>
    <div class="modal-overlay" id="deleteModal">
      <div class="modal modal-sm">
        <div class="modal-body text-center">
          <p class="modal-text">
            Are you sure you want to delete this content?
          </p>
        </div>
        <div class="modal-footer modal-footer-center">
          <button class="btn btn-secondary" onclick="closeDeleteModal()">
            Cancel
          </button>
          <button class="btn btn-danger" onclick="confirmDelete()">
            Delete
          </button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="logoutModal">
      <div class="modal modal-sm">
        <div class="modal-body text-center">
          <p class="modal-text">Are you sure you want to log out?</p>
        </div>
        <div class="modal-footer modal-footer-center">
          <button class="btn btn-secondary" onclick="closeLogoutModal()">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="confirmLogout()">
            Log out
          </button>
        </div>
      </div>
    </div>
    <!-- Success Overlay -->
    <div class="success-overlay hidden" id="successOverlay">
      <div class="success-icon">✓</div>
      <p class="success-text" id="successText">
        You have been successfully logged out
      </p>
    </div>
    <script src="../helper/notificationsHelper.js"></script>
    <script src="../scripts/admin.js"></script>
    <script src="../helper/apiHelper.js"></script>
    <script src="../helper/uiHelper.js"></script>
    <script src="../helper/logout.js"></script>
  </body>
</html>
