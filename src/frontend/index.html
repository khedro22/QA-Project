<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning Hub - Login</title>
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/loginStyle.css">
</head>
<body>
  <div class="auth-page">
    <header class="auth-header">
      <div class="logo">
        <div class="logo-icon">LH</div>
        <span>Learning Hub</span>
      </div>
    </header>
    
    <div class="auth-card">
      <div class="auth-body">
        <h1 class="auth-title">Login into your account</h1>
        
        <div class="alert alert-error" id="formError"></div>
        
        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="login">Email Address / Username</label>
            <input 
              type="text" 
              id="login" 
              class="form-input" 
              placeholder="Enter your username or email address"
              autocomplete="username"
            >
            <div class="error-msg" id="loginError">Please enter your username or email</div>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="Enter your password"
              autocomplete="current-password"
            >
            <div class="error-msg" id="passwordError">Please enter your password</div>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block btn-lg">Log in</button>
        </form>
        
        <p class="link-text">
          Don't have an account? <a href="./pages/register.html">Sign up</a>
        </p>
      </div>
    </div>
  </div>

  <script src="./scripts/Auth.js"></script>
  <script src="./scripts/Login.js"></script>
</body>
</html>
